# ============================================================
# nginx.conf — Nginx Site Configuration
# Place at: /etc/nginx/sites-available/satapp
# Enable: ln -s /etc/nginx/sites-available/satapp /etc/nginx/sites-enabled/
# ============================================================
# Replace "yourdomain.com" with your actual domain name!
# SSL block will be filled in automatically by: certbot --nginx -d mastersat.uz

server {
    listen 80;
    server_name mastersat.uz www.mastersat.uz;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mastersat.uz www.mastersat.uz;

    # ── SSL (Certbot will fill these in) ─────────────────────
    # ssl_certificate /etc/letsencrypt/live/mastersat.uz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mastersat.uz/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ── Django Static Files (served directly by Nginx) ───────
    location /static/ {
        alias /var/www/satapp/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Django Media Files ────────────────────────────────────
    location /media/ {
        alias /var/www/satapp/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Django REST API ───────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        client_max_body_size 20M;
    }

    # ── Django Admin ──────────────────────────────────────────
    location /django-admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Next.js Frontend ──────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache Next.js static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://127.0.0.1:3000;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }
    }

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/satapp-access.log;
    error_log /var/log/nginx/satapp-error.log warn;
}
