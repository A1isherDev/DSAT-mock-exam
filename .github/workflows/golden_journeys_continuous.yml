name: Golden Journeys (continuous)

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"

jobs:
  golden_journeys:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright (Chromium)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run golden journeys
        working-directory: frontend
        env:
          # Main domain (student/teacher)
          BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
          E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}
          E2E_TEACHER_EMAIL: ${{ secrets.E2E_TEACHER_EMAIL }}
          E2E_TEACHER_PASSWORD: ${{ secrets.E2E_TEACHER_PASSWORD }}
          E2E_PRACTICE_TEST_ID: ${{ secrets.E2E_PRACTICE_TEST_ID }}
          E2E_CLASSROOM_ID: ${{ secrets.E2E_CLASSROOM_ID }}
          # Admin domain
          E2E_ADMIN_BASE_URL: ${{ secrets.E2E_ADMIN_BASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          # Questions domain (test_admin)
          E2E_QUESTIONS_BASE_URL: ${{ secrets.E2E_QUESTIONS_BASE_URL }}
          E2E_TEST_ADMIN_EMAIL: ${{ secrets.E2E_TEST_ADMIN_EMAIL }}
          E2E_TEST_ADMIN_PASSWORD: ${{ secrets.E2E_TEST_ADMIN_PASSWORD }}
        run: npx playwright test tests/e2e/golden_journeys_api.spec.ts

