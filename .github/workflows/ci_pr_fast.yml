name: CI (PR fast)

on:
  pull_request:

jobs:
  backend-fast:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt
      - name: Django system check
        run: python manage.py check
      - name: Ensure no schema drift
        run: python manage.py makemigrations --check --dry-run
      - name: Backend tests (fast subset)
        run: |
          start=$(date +%s)
          python manage.py test access.tests classes.tests exams.tests.test_smoke_exam_resume_status -v 2
          dur=$(( $(date +%s) - start ))
          echo "backend_fast_seconds=$dur"
          test $dur -le 420

  frontend-fast:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Dead-code check
        run: npm run deadcode
      - name: Forbid direct "/api" strings outside API layers
        run: |
          rg -n "\"/api/" src \
            --glob '!src/lib/api.ts' \
            --glob '!src/features/**/api.ts' \
            --glob '!src/lib/openapi-types.ts'
      - name: Generate OpenAPI types/client (must be up to date)
        run: |
          npm run gen:openapi
          npm run gen:openapi-client
          git diff --exit-code
      - name: Build
        run: |
          start=$(date +%s)
          npm run build
          dur=$(( $(date +%s) - start ))
          echo "frontend_build_seconds=$dur"
          test $dur -le 300

  error-budget-gate:
    name: Error budget gate (golden journeys)
    runs-on: ubuntu-latest
    steps:
      - name: Check latest golden journeys run is healthy
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = "golden_journeys_continuous.yml";
            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              per_page: 5,
            });
            const latest = (runs.data.workflow_runs || [])[0];
            if (!latest) {
              core.setFailed(`No runs found for workflow ${workflow_id}.`);
              return;
            }
            const conclusion = latest.conclusion || "unknown";
            const status = latest.status || "unknown";
            const updatedAt = latest.updated_at || "";
            core.info(`Latest golden journeys: status=${status} conclusion=${conclusion} updated_at=${updatedAt}`);
            if (status !== "completed" || conclusion !== "success") {
              core.setFailed(`Golden journeys not green: status=${status} conclusion=${conclusion}`);
            }

