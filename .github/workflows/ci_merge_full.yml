name: CI (merge full)

on:
  push:
    branches: ["main", "master"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt
      - name: Django system check
        run: python manage.py check
      - name: Ensure no schema drift
        run: python manage.py makemigrations --check --dry-run
      - name: Backend tests (full)
        run: |
          start=$(date +%s)
          python manage.py test -v 2
          dur=$(( $(date +%s) - start ))
          echo "backend_full_seconds=$dur"
          test $dur -le 1200
      - name: Generate OpenAPI schema (must succeed)
        run: python manage.py spectacular --file ../openapi-ci.yaml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Lint
        run: npm run lint
      - name: Dead-code check
        run: npm run deadcode
      - name: Forbid direct "/api" strings outside API layers
        run: |
          rg -n "\"/api/" src \
            --glob '!src/lib/api.ts' \
            --glob '!src/features/**/api.ts' \
            --glob '!src/lib/openapi-types.ts'
      - name: Generate OpenAPI types/client (must be up to date)
        run: |
          npm run gen:openapi
          npm run gen:openapi-client
          git diff --exit-code
      - name: Build
        run: |
          start=$(date +%s)
          npm run build
          dur=$(( $(date +%s) - start ))
          echo "frontend_build_seconds=$dur"
          test $dur -le 600
      - name: E2E smoke (Playwright)
        run: npm run test:e2e

